<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="50%" style="stop-color:#e67e22"/>
      <stop offset="100%" style="stop-color:#f1c40f"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f1c40f;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="2" y="2" width="476" height="116" rx="24" fill="#0c0c14" stroke="url(#g1)" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Eye/focus icon -->
  <g transform="translate(36, 28)">
    <!-- Outer eye shape -->
    <path d="M0 32 Q32 0 64 32 Q32 64 0 32Z" fill="none" stroke="url(#g1)" stroke-width="3"/>
    <!-- Iris -->
    <circle cx="32" cy="32" r="16" fill="none" stroke="url(#g1)" stroke-width="2.5"/>
    <!-- Pupil / ORP dot -->
    <circle cx="32" cy="32" r="6" fill="url(#g1)"/>
    <!-- ORP crosshair tick -->
    <line x1="32" y1="12" x2="32" y2="18" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text: Sensory -->
  <text x="116" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="800" letter-spacing="-0.02em" fill="#e8e8ec">
    Sens<tspan fill="url(#g1)">o</tspan>ry
  </text>

  <!-- Text: Reader -->
  <text x="116" y="94" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="300" letter-spacing="0.06em" fill="#8b8b9e">
    Reader
  </text>

  <!-- Speed lines -->
  <g opacity="0.25">
    <line x1="370" y1="38" x2="440" y2="38" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
    <line x1="380" y1="52" x2="450" y2="52" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
    <line x1="370" y1="66" x2="440" y2="66" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
    <line x1="390" y1="80" x2="445" y2="80" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
